<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pelatihan Model - EduSentiment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .submenu { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 w-full h-14 bg-gray-800 text-white flex items-center justify-between px-5 z-50">
    <div class="text-xl font-bold">Admin Panel</div>
    <div>
        <a href="login_admin.html" class="bg-white text-gray-800 font-bold py-2 px-4 rounded-md hover:bg-gray-200 transition-colors">Logout</a>
    </div>
</nav>

<!-- SIDEBAR -->
<aside class="fixed left-0 top-14 h-[calc(100vh-3.5rem)] w-56 bg-gray-700 text-white overflow-y-auto pt-2">
    <a href="dashboard_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Dashboard</a>
    <a href="dataset_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Dataset</a>
    <a href="preprocessing_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Pre-Processing</a>

    <div class="py-3 px-5 hover:bg-teal-500 transition-colors cursor-pointer flex items-center justify-between" onclick="toggleMenu('processMenu')">
        <span>Processing</span>
        <svg class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
    </div>
    <div class="submenu bg-gray-600" id="processMenu">
        <a href="pengaturan_admin.html" class="block py-2 pl-10 pr-5 hover:bg-teal-500 transition-colors text-sm">Pengaturan</a>
        <a href="pelatihanmodel_admin.html" class="block py-2 pl-10 pr-5 hover:bg-teal-500 transition-colors text-sm bg-teal-500">Pelatihan Model</a>
    </div>

    <a href="testing_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Testing</a>
    <a href="evaluasi_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Evaluasi</a>
</aside>

<!-- CONTENT -->
<main class="ml-56 mt-14 p-6 min-h-screen">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Pelatihan Model</h1>

    <!-- FORM MULAI TRAINING -->
    <div class="bg-white p-5 rounded-lg shadow-md mb-6">
        <h3 class="text-lg font-semibold text-gray-700 mb-3">Mulai Sesi Training Baru</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Model</label>
                <select id="modelSelect" class="border border-gray-300 rounded-md px-3 py-2 text-sm w-full">
                    <option value="">-- Pilih Model --</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Dataset Bersih</label>
                <select id="datasetSelect" class="border border-gray-300 rounded-md px-3 py-2 text-sm w-full">
                    <option value="">-- Pilih Dataset --</option>
                </select>
            </div>
        </div>
        <button onclick="mulaiTraining()" class="mt-4 bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-6 rounded-md transition-colors">
            Proses Training
        </button>
        <p id="trainingStatus" class="mt-3 text-sm"></p>
    </div>

    <!-- RIWAYAT TRAINING -->
    <div class="bg-white p-5 rounded-lg shadow-md">
        <h3 class="text-lg font-semibold text-gray-700 mb-3">Riwayat Sesi Training</h3>
        <div class="overflow-x-auto">
            <table class="w-full border-collapse">
                <thead>
                    <tr>
                        <th class="bg-gray-800 text-white p-2 text-sm">No</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Model</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Dataset</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Status</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Akurasi</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Tanggal</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Aksi</th>
                    </tr>
                </thead>
                <tbody id="sessionList">
                    <tr><td colspan="7" class="p-2 text-center text-gray-500">Belum ada sesi training</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
const supabaseUrl = "https://ylaxeriooiwytmjrklff.supabase.co";
const supabaseKey = "sb_publishable_RBYPP8Wxw_lz2xNY77mcvw_jSuIzaHb";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

function toggleMenu(id) { document.getElementById(id).classList.toggle('hidden'); }

let models = [];
let datasets = [];

// Muat model dan dataset untuk dropdown
async function loadOptions() {
    // Model
    const { data: modelData } = await supabaseClient.from("models").select("id, nama");
    models = modelData || [];
    const modelSelect = document.getElementById("modelSelect");
    modelSelect.innerHTML = '<option value="">-- Pilih Model --</option>';
    models.forEach(m => {
        modelSelect.innerHTML += `<option value="${m.id}">${m.nama}</option>`;
    });

    // Dataset bersih
    const { data: dsData } = await supabaseClient.from("clean_datasets").select("id, name");
    datasets = dsData || [];
    const datasetSelect = document.getElementById("datasetSelect");
    datasetSelect.innerHTML = '<option value="">-- Pilih Dataset --</option>';
    datasets.forEach(d => {
        datasetSelect.innerHTML += `<option value="${d.id}">${d.name}</option>`;
    });
}

// Muat riwayat training
async function loadSessions() {
    const { data, error } = await supabaseClient
        .from("training_sessions")
        .select(`
            id, status, metrics, started_at, finished_at, created_at,
            models ( id, nama ),
            clean_datasets ( id, name )
        `)
        .order("created_at", { ascending: false });
    const tbody = document.getElementById("sessionList");
    if (error || !data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="p-2 text-center text-gray-500">Belum ada sesi training</td></tr>';
        return;
    }
    tbody.innerHTML = data.map((s, i) => {
        const metrics = s.metrics || {};
        const acc = metrics.accuracy ? (metrics.accuracy * 100).toFixed(2) + '%' : '-';
        const statusClass = {
            pending: 'bg-yellow-100 text-yellow-800',
            running: 'bg-blue-100 text-blue-800',
            completed: 'bg-green-100 text-green-800',
            failed: 'bg-red-100 text-red-800'
        }[s.status] || '';
        return `
        <tr class="even:bg-gray-50">
            <td class="p-2 text-center">${i+1}</td>
            <td class="p-2 text-center">${s.models?.nama || 'Model dihapus'}</td>
            <td class="p-2 text-center">${s.clean_datasets?.name || '-'}</td>
            <td class="p-2 text-center"><span class="px-2 py-1 rounded text-xs font-semibold ${statusClass}">${s.status}</span></td>
            <td class="p-2 text-center">${acc}</td>
            <td class="p-2 text-center">${new Date(s.created_at).toLocaleDateString()}</td>
            <td class="p-2 text-center">
                ${s.status === 'completed' ? `<button onclick="lihatDetail(${s.id})" class="bg-blue-500 hover:bg-blue-600 text-white text-sm py-1 px-3 rounded mr-1">Detail</button>` : ''}
                <button onclick="hapusSesi(${s.id})" class="bg-red-500 hover:bg-red-600 text-white text-sm py-1 px-3 rounded">Hapus</button>
            </td>
        </tr>`;
    }).join('');
}

// Buat sesi training baru (status: pending)
async function mulaiTraining() {
    const modelId = document.getElementById("modelSelect").value;
    const datasetId = document.getElementById("datasetSelect").value;
    if (!modelId || !datasetId) {
        alert("Pilih model dan dataset terlebih dahulu.");
        return;
    }

    // Dapatkan konfigurasi model yang dipilih
    const { data: model } = await supabaseClient.from("models").select("config").eq("id", modelId).single();
    if (!model) { alert("Model tidak ditemukan."); return; }

    const { error } = await supabaseClient.from("training_sessions").insert([{
        model_id: modelId,
        clean_dataset_id: datasetId,
        status: "pending",
        config: model.config  // simpan snapshot config
    }]);

    if (error) {
        document.getElementById("trainingStatus").innerHTML = "❌ Gagal membuat sesi: " + error.message;
    } else {
        document.getElementById("trainingStatus").innerHTML = "✅ Sesi training berhasil dibuat. Status: pending.";
        loadSessions(); // refresh daftar
    }
}

async function hapusSesi(id) {
    if (!confirm("Hapus sesi training ini?")) return;
    const { error } = await supabaseClient.from("training_sessions").delete().eq("id", id);
    if (error) alert("Gagal: " + error.message);
    else loadSessions();
}

function lihatDetail(id) {
    window.location.href = `detail_training.html?id=${id}`;
}

window.onload = () => {
    loadOptions();
    loadSessions();
};
</script>
</body>
</html>
