<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Admin - EduSentiment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .submenu { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 w-full h-14 bg-gray-800 text-white flex items-center justify-between px-5 z-50">
    <div class="text-xl font-bold">Admin Panel</div>
    <div>
        <a href="login_admin.html" class="bg-white text-gray-800 font-bold py-2 px-4 rounded-md hover:bg-gray-200 transition-colors">Logout</a>
    </div>
</nav>

<!-- SIDEBAR -->
<aside class="fixed left-0 top-14 h-[calc(100vh-3.5rem)] w-56 bg-gray-700 text-white overflow-y-auto pt-2">
    <a href="dashboard_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Dashboard</a>
    <a href="dataset_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Dataset</a>
    <a href="preprocessing_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Pre-Processing</a>

    <div class="py-3 px-5 hover:bg-teal-500 transition-colors cursor-pointer flex items-center justify-between" onclick="toggleMenu('processMenu')">
        <span>Processing</span>
        <svg class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
    </div>
    <div class="submenu hidden bg-gray-600" id="processMenu">
        <a href="pengaturan_admin.html" class="block py-2 pl-10 pr-5 hover:bg-teal-500 transition-colors text-sm">Pengaturan</a>
        <a href="pelatihanmodel_admin.html" class="block py-2 pl-10 pr-5 hover:bg-teal-500 transition-colors text-sm">Pelatihan Model</a>
    </div>

    <a href="testing_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Testing</a>
    <a href="evaluasi_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Evaluasi</a>
</aside>

<!-- CONTENT -->
<main class="ml-56 mt-14 p-6 min-h-screen">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Manajemen Dataset Mentah</h1>

    <!-- UPLOAD -->
    <div class="bg-white p-5 rounded-lg shadow-md mb-6">
        <h3 class="text-lg font-semibold text-gray-700 mb-3">Upload Dataset CSV / Excel</h3>
        <div class="flex items-center gap-3 flex-wrap">
            <input type="file" id="fileCSV" accept=".csv, .xlsx" class="border border-gray-300 rounded-md p-2 text-sm">
            <button onclick="uploadRaw()" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-md transition-colors">Upload</button>
        </div>
        <p id="statusUpload" class="mt-3 text-sm"></p>
    </div>

    <!-- TABEL DATASET MENTAH -->
    <div class="bg-white p-5 rounded-lg shadow-md mb-6">
        <h3 class="text-lg font-semibold text-gray-700 mb-3">Daftar Dataset Mentah</h3>
        <input type="text" id="searchRaw" placeholder="Cari nama dataset..." onkeyup="renderTable()"
               class="border border-gray-300 rounded-md px-3 py-2 text-sm w-full sm:w-1/3 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400">
        <div class="overflow-x-auto">
            <table class="w-full border-collapse">
                <thead>
                    <tr>
                        <th class="bg-gray-800 text-white p-2 text-sm">No</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Nama Dataset</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Jumlah Data</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Tanggal Upload</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Aksi</th>
                    </tr>
                </thead>
                <tbody id="listRaw"></tbody>
            </table>
        </div>
        <div id="paginationRaw" class="flex justify-center items-center gap-3 mt-4"></div>
    </div>

    <!-- DETAIL DATASET (MODAL) -->
    <div class="bg-white p-5 rounded-lg shadow-md mb-6 hidden" id="detailDataset">
        <h3 id="judulDataset" class="text-lg font-semibold text-gray-700 mb-3">Detail Dataset</h3>
        <div class="overflow-x-auto">
            <table class="w-full border-collapse">
                <thead>
                    <tr>
                        <th class="bg-gray-800 text-white p-2 text-sm">No</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Kalimat</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Label</th>
                    </tr>
                </thead>
                <tbody id="isiDataset"></tbody>
            </table>
        </div>
        <div id="paginationDetail" class="flex justify-center items-center gap-3 mt-4"></div>
        <button onclick="closeDetail()" class="mt-4 bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded-md transition-colors">Tutup</button>
    </div>
</main>

<script>
const BASE_URL = "http://localhost:8000/api";
const ITEMS_PER_PAGE = 10;
let token = localStorage.getItem("token");
let rawData = [];
let rawPage = 1;
let detailPage = 1;
let detailId = null;

async function fetchWithAuth(url, options = {}) {
    if (!token) {
        alert("Silakan login terlebih dahulu.");
        window.location.href = "login_admin.html";
        throw new Error("Tidak ada token");
    }
    const headers = { "Authorization": `Bearer ${token}` };
    if (!(options.body instanceof FormData)) headers["Content-Type"] = "application/json";
    const response = await fetch(url, { ...options, headers });
    if (response.status === 401) {
        localStorage.removeItem("token");
        alert("Sesi telah berakhir.");
        window.location.href = "login_admin.html";
        throw new Error("Unauthorized");
    }
    if (!response.ok) {
        let errMsg = `Gagal (${response.status})`;
        try { const err = await response.json(); errMsg = err.detail || errMsg; } catch(e) {}
        throw new Error(errMsg);
    }
    return response.json();
}

async function fetchRaw() {
    try {
        rawData = await fetchWithAuth(`${BASE_URL}/raw-datasets/`);
    } catch (error) {
        console.error(error);
        alert("Gagal memuat dataset mentah: " + error.message);
        rawData = [];
    }
}

function renderTable() {
    const searchInput = document.getElementById("searchRaw").value.toLowerCase();
    let filtered = rawData.filter(ds => ds.name.toLowerCase().includes(searchInput));

    const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE) || 1;
    if (rawPage > totalPages) rawPage = totalPages;
    const start = (rawPage - 1) * ITEMS_PER_PAGE;
    const pageData = filtered.slice(start, start + ITEMS_PER_PAGE);

    const tbody = document.getElementById("listRaw");
    tbody.innerHTML = "";
    pageData.forEach((ds, idx) => {
        const no = start + idx + 1;
        const row = document.createElement("tr");
        row.className = "even:bg-gray-50";
        row.innerHTML = `
            <td class="p-2 text-center">${no}</td>
            <td class="p-2 text-center">
                <span>${ds.name}</span>
                <button onclick="renameRaw(${ds.id})" class="ml-2 text-blue-500 hover:text-blue-700">✏️</button>
            </td>
            <td class="p-2 text-center">${ds.jumlah_data}</td>
            <td class="p-2 text-center">${ds.tanggal_upload}</td>
            <td class="p-2 text-center">
                <button onclick="lihatDetail(${ds.id})" class="bg-blue-500 hover:bg-blue-600 text-white text-sm font-semibold py-1 px-3 rounded-md mr-1">Lihat</button>
                <button onclick="hapusRaw(${ds.id})" class="bg-red-500 hover:bg-red-600 text-white text-sm font-semibold py-1 px-3 rounded-md">🗑️</button>
            </td>
        `;
        tbody.appendChild(row);
    });
    renderPagination(totalPages);
}

function renderPagination(totalPages) {
    const container = document.getElementById("paginationRaw");
    container.innerHTML = "";
    if (totalPages <= 1) return;
    const prev = document.createElement("button");
    prev.textContent = "← Sebelumnya";
    prev.className = "px-3 py-1 border border-gray-300 rounded-md bg-white hover:bg-gray-100 disabled:opacity-50";
    prev.disabled = rawPage === 1;
    prev.onclick = () => { rawPage--; renderTable(); };
    const next = document.createElement("button");
    next.textContent = "Berikutnya →";
    next.className = "px-3 py-1 border border-gray-300 rounded-md bg-white hover:bg-gray-100 disabled:opacity-50";
    next.disabled = rawPage === totalPages;
    next.onclick = () => { rawPage++; renderTable(); };
    const info = document.createElement("span");
    info.textContent = `Halaman ${rawPage} dari ${totalPages}`;
    info.className = "text-sm text-gray-600";
    container.appendChild(prev);
    container.appendChild(info);
    container.appendChild(next);
}

async function renameRaw(id) {
    const ds = rawData.find(d => d.id === id);
    if (!ds) return;
    const newName = prompt("Nama baru:", ds.name);
    if (!newName || !newName.trim()) return;
    const formData = new FormData();
    formData.append("name", newName.trim());
    try {
        await fetchWithAuth(`${BASE_URL}/raw-datasets/${id}/rename`, { method: "PUT", body: formData });
        await fetchRaw();
        renderTable();
    } catch (error) { alert("Gagal: " + error.message); }
}

async function hapusRaw(id) {
    if (!confirm("Yakin ingin menghapus?")) return;
    try {
        await fetchWithAuth(`${BASE_URL}/raw-datasets/${id}`, { method: "DELETE" });
        if (detailId === id) {
            document.getElementById("detailDataset").classList.add("hidden");
            detailId = null;
        }
        await fetchRaw();
        renderTable();
    } catch (error) { alert("Gagal: " + error.message); }
}

async function uploadRaw() {
    const fileInput = document.getElementById("fileCSV");
    const status = document.getElementById("statusUpload");
    if (!fileInput.files[0]) {
        status.innerHTML = "⚠️ Pilih file CSV terlebih dahulu";
        status.className = "mt-3 text-sm text-yellow-600";
        return;
    }
    const defaultName = fileInput.files[0].name.replace(/\.(csv|xlsx)$/i, "");
    const newName = prompt("Masukkan nama dataset:", defaultName);
    if (!newName || !newName.trim()) {
        status.innerHTML = "⚠️ Nama dataset tidak boleh kosong";
        status.className = "mt-3 text-sm text-yellow-600";
        return;
    }
    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    formData.append("name", newName.trim());
    status.innerHTML = "⏳ Uploading...";
    status.className = "mt-3 text-sm text-blue-600";
    try {
        await fetchWithAuth(`${BASE_URL}/raw-datasets/upload`, { method: "POST", body: formData });
        status.innerHTML = `✅ Dataset "${newName.trim()}" berhasil diupload`;
        status.className = "mt-3 text-sm text-green-600";
        fileInput.value = "";
        await fetchRaw();
        renderTable();
    } catch (error) {
        status.innerHTML = `❌ Gagal upload: ${error.message}`;
        status.className = "mt-3 text-sm text-red-600";
    }
}

// Detail
async function lihatDetail(id) {
    detailId = id;
    detailPage = 1;
    document.getElementById("detailDataset").classList.remove("hidden");
    const ds = rawData.find(d => d.id === id);
    document.getElementById("judulDataset").textContent = `Detail Dataset Mentah: ${ds ? ds.name : id}`;
    await loadDetail();
}
async function loadDetail() {
    if (!detailId) return;
    try {
        const data = await fetchWithAuth(`${BASE_URL}/raw-datasets/${detailId}/items?page=${detailPage}&per_page=${ITEMS_PER_PAGE}`);
        const tbody = document.getElementById("isiDataset");
        tbody.innerHTML = "";
        data.items.forEach(item => {
            const row = document.createElement("tr");
            row.className = "even:bg-gray-50";
            row.innerHTML = `<td class="p-2 text-center">${item.no}</td><td class="p-2">${item.text}</td><td class="p-2 text-center">${item.label ?? "-"}</td>`;
            tbody.appendChild(row);
        });
        const totalPages = Math.ceil(data.total / ITEMS_PER_PAGE) || 1;
        renderDetailPagination(totalPages);
    } catch (error) { alert("Gagal memuat detail: " + error.message); }
}
function renderDetailPagination(totalPages) {
    const container = document.getElementById("paginationDetail");
    container.innerHTML = "";
    if (totalPages <= 1) return;
    const prev = document.createElement("button"); prev.textContent = "← Sebelumnya"; prev.className = "px-3 py-1 border border-gray-300 rounded-md bg-white hover:bg-gray-100 disabled:opacity-50"; prev.disabled = detailPage === 1; prev.onclick = () => { detailPage--; loadDetail(); };
    const next = document.createElement("button"); next.textContent = "Berikutnya →"; next.className = "px-3 py-1 border border-gray-300 rounded-md bg-white hover:bg-gray-100 disabled:opacity-50"; next.disabled = detailPage === totalPages; next.onclick = () => { detailPage++; loadDetail(); };
    container.appendChild(prev); container.appendChild(next);
}
function closeDetail() { document.getElementById("detailDataset").classList.add("hidden"); detailId = null; }

function toggleMenu(menuId) {
    const menus = document.querySelectorAll('.submenu');
    menus.forEach(menu => { if (menu.id !== menuId) menu.classList.add('hidden'); });
    document.getElementById(menuId).classList.toggle('hidden');
}

window.onload = async () => {
    if (!token) { window.location.href = "login_admin.html"; return; }
    await fetchRaw();
    renderTable();
};
</script>
</body>
</html>
