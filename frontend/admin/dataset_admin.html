<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Admin - EduSentiment</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .submenu {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 w-full h-14 bg-gray-800 text-white flex items-center justify-between px-5 z-50">
    <div class="text-xl font-bold">Admin Panel</div>
    <div>
        <a href="login_admin.html" class="bg-white text-gray-800 font-bold py-2 px-4 rounded-md hover:bg-gray-200 transition-colors">Logout</a>
    </div>
</nav>

<!-- SIDEBAR -->
<aside class="fixed left-0 top-14 h-[calc(100vh-3.5rem)] w-56 bg-gray-700 text-white overflow-y-auto pt-2">
    <a href="dashboard_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Dashboard</a>
    <a href="dataset_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Dataset</a>
    <a href="preprocessing_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Pre-Processing</a>

    <div class="py-3 px-5 hover:bg-teal-500 transition-colors cursor-pointer flex items-center justify-between" onclick="toggleMenu('processMenu')">
        <span>Processing</span>
        <svg class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
    </div>
    <div class="submenu hidden bg-gray-600" id="processMenu">
        <a href="pengaturan_admin.html" class="block py-2 pl-10 pr-5 hover:bg-teal-500 transition-colors text-sm">Pengaturan</a>
        <a href="pelatihanmodel_admin.html" class="block py-2 pl-10 pr-5 hover:bg-teal-500 transition-colors text-sm">Pelatihan Model</a>
    </div>

    <a href="testing_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Testing</a>
    <a href="evaluasi_admin.html" class="block py-3 px-5 hover:bg-teal-500 transition-colors">Evaluasi</a>
</aside>

<!-- CONTENT -->
<main class="ml-56 mt-14 p-6 min-h-screen">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Manajemen Dataset</h1>

    <!-- UPLOAD -->
    <div class="bg-white p-5 rounded-lg shadow-md mb-6">
        <h3 class="text-lg font-semibold text-gray-700 mb-3">Upload Dataset CSV</h3>
        <div class="flex items-center gap-3 flex-wrap">
            <input type="file" id="fileCSV" accept=".csv" class="border border-gray-300 rounded-md p-2 text-sm">
            <button onclick="uploadCSV()" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-md transition-colors">Upload</button>
        </div>
        <p id="statusUpload" class="mt-3 text-sm"></p>
    </div>

    <!-- DAFTAR DATASET -->
    <div class="bg-white p-5 rounded-lg shadow-md mb-6">
        <h3 class="text-lg font-semibold text-gray-700 mb-3">Daftar Dataset</h3>

        <!-- SEARCH -->
        <input
            type="text"
            id="searchInput"
            placeholder="Cari nama dataset..."
            onkeyup="searchDataset()"
            class="border border-gray-300 rounded-md px-3 py-2 text-sm w-full sm:w-1/3 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400"
        >

        <div class="overflow-x-auto">
            <table class="w-full border-collapse">
                <thead>
                    <tr>
                        <th class="bg-gray-800 text-white p-2 text-sm">ID Dataset</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Nama Dataset</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Jumlah Data</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Tanggal Upload</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Aksi</th>
                    </tr>
                </thead>
                <tbody id="listDataset">
                    <!-- Diisi JavaScript -->
                </tbody>
            </table>
        </div>
        <!-- Pagination daftar dataset -->
        <div id="paginationList" class="flex justify-center items-center gap-3 mt-4"></div>
    </div>

    <!-- DETAIL DATASET -->
    <div class="bg-white p-5 rounded-lg shadow-md mb-6 hidden" id="detailDataset">
        <h3 id="judulDataset" class="text-lg font-semibold text-gray-700 mb-3">Detail Dataset</h3>
        <div class="overflow-x-auto">
            <table class="w-full border-collapse">
                <thead>
                    <tr>
                        <th class="bg-gray-800 text-white p-2 text-sm">No</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Kalimat</th>
                        <th class="bg-gray-800 text-white p-2 text-sm">Label</th>
                    </tr>
                </thead>
                <tbody id="isiDataset"></tbody>
            </table>
        </div>
        <!-- Pagination detail -->
        <div id="paginationDetail" class="flex justify-center items-center gap-3 mt-4"></div>
    </div>
</main>

<!-- ==================== SCRIPT ==================== -->
<script>
// ==================== KONFIGURASI ====================
const BASE_URL = "http://localhost:8000/api";
const ITEMS_PER_PAGE = 10;
let currentPageList = 1;
let currentPageDetail = 1;
let datasetDetailId = null;
let token = localStorage.getItem("token");

// ==================== FUNGSI PEMBANTU ====================
async function fetchWithAuth(url, options = {}) {
    if (!token) {
        alert("Silakan login terlebih dahulu.");
        window.location.href = "login_admin.html";
        throw new Error("Tidak ada token");
    }

    const headers = {
        "Authorization": `Bearer ${token}`,
    };
    // Jangan set Content-Type manual untuk FormData
    if (!(options.body instanceof FormData)) {
        headers["Content-Type"] = "application/json";
    }

    const response = await fetch(url, { ...options, headers });

    if (response.status === 401) {
        localStorage.removeItem("token");
        alert("Sesi telah berakhir. Silakan login kembali.");
        window.location.href = "login_admin.html";
        throw new Error("Unauthorized");
    }

    if (!response.ok) {
        let errMsg = `Gagal melakukan request (${response.status})`;
        try {
            const err = await response.json();
            errMsg = err.detail || errMsg;
        } catch (e) {}
        throw new Error(errMsg);
    }

    return response.json();
}

// ==================== DATA DATASET ====================
async function fetchDatasets() {
    try {
        const datasets = await fetchWithAuth(`${BASE_URL}/datasets/`);
        return datasets;
    } catch (error) {
        console.error(error);
        alert("Gagal memuat dataset: " + error.message);
        return [];
    }
}

// ==================== RENDER DAFTAR DATASET ====================
function renderFilteredDatasetList() {
    const input = document.getElementById("searchInput").value.toLowerCase();
    let datasets = window.allDatasets || [];

    if (input) {
        datasets = datasets.filter(ds => ds.name.toLowerCase().includes(input));
    }

    // Pagination
    const totalItems = datasets.length;
    const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE) || 1;
    if (currentPageList > totalPages) currentPageList = totalPages;
    if (currentPageList < 1) currentPageList = 1;

    const start = (currentPageList - 1) * ITEMS_PER_PAGE;
    const end = start + ITEMS_PER_PAGE;
    const pageDatasets = datasets.slice(start, end);

    const tbody = document.getElementById("listDataset");
    tbody.innerHTML = "";

    pageDatasets.forEach(ds => {
        const row = document.createElement("tr");
        row.className = "even:bg-gray-50";
        row.innerHTML = `
            <td class="p-2 text-center">${ds.id}</td>
            <td class="p-2 text-center">
                <span class="nama">${ds.name}</span>
                <button onclick="renameDataset(${ds.id})" class="ml-2 text-blue-500 hover:text-blue-700" title="Ganti nama">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                </button>
            </td>
            <td class="p-2 text-center">${ds.jumlah_data}</td>
            <td class="p-2 text-center">${ds.tanggal_upload}</td>
            <td class="p-2 text-center">
                <button onclick="tampilDataset(${ds.id})" class="bg-blue-500 hover:bg-blue-600 text-white text-sm font-semibold py-1 px-3 rounded-md mr-1 transition-colors">Lihat</button>
                <button onclick="hapusDataset(${ds.id})" class="bg-red-500 hover:bg-red-600 text-white text-sm font-semibold py-1 px-3 rounded-md transition-colors">🗑️</button>
            </td>
        `;
        tbody.appendChild(row);
    });

    renderPaginationList(totalPages);
}

function renderPaginationList(totalPages) {
    const container = document.getElementById("paginationList");
    container.innerHTML = "";

    if (totalPages <= 1) return;

    const prevBtn = document.createElement("button");
    prevBtn.textContent = "← Sebelumnya";
    prevBtn.className = "px-3 py-1 border border-gray-300 rounded-md bg-white hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed";
    prevBtn.disabled = currentPageList === 1;
    prevBtn.onclick = () => {
        if (currentPageList > 1) {
            currentPageList--;
            renderFilteredDatasetList();
        }
    };

    const nextBtn = document.createElement("button");
    nextBtn.textContent = "Berikutnya →";
    nextBtn.className = "px-3 py-1 border border-gray-300 rounded-md bg-white hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed";
    nextBtn.disabled = currentPageList === totalPages;
    nextBtn.onclick = () => {
        if (currentPageList < totalPages) {
            currentPageList++;
            renderFilteredDatasetList();
        }
    };

    const pageInfo = document.createElement("span");
    pageInfo.textContent = `Halaman ${currentPageList} dari ${totalPages}`;
    pageInfo.className = "text-sm text-gray-600";

    container.appendChild(prevBtn);
    container.appendChild(pageInfo);
    container.appendChild(nextBtn);
}

// Pencarian
function searchDataset() {
    currentPageList = 1;  // reset ke halaman pertama
    renderFilteredDatasetList();
}

// ==================== OPERASI DATASET ====================
async function renameDataset(id) {
    const datasets = window.allDatasets || [];
    const dataset = datasets.find(ds => ds.id === id);
    if (!dataset) return;

    const newName = prompt("Masukkan nama baru untuk dataset:", dataset.name);
    if (!newName || newName.trim() === "") return;

    try {
        const formData = new FormData();
        formData.append("name", newName.trim());
        await fetchWithAuth(`${BASE_URL}/datasets/${id}/rename`, {
            method: "PUT",
            body: formData
        });
        // Refresh data
        window.allDatasets = await fetchDatasets();
        renderFilteredDatasetList();
    } catch (error) {
        alert("Gagal mengganti nama: " + error.message);
    }
}

async function hapusDataset(id) {
    if (!confirm("Yakin ingin menghapus dataset ini?")) return;

    try {
        await fetchWithAuth(`${BASE_URL}/datasets/${id}`, {
            method: "DELETE"
        });
        if (datasetDetailId === id) {
            document.getElementById("detailDataset").classList.add("hidden");
            datasetDetailId = null;
        }
        window.allDatasets = await fetchDatasets();
        renderFilteredDatasetList();
    } catch (error) {
        alert("Gagal menghapus dataset: " + error.message);
    }
}

async function uploadCSV() {
    const fileInput = document.getElementById("fileCSV");
    const status = document.getElementById("statusUpload");

    if (!fileInput.files[0]) {
        status.innerHTML = "⚠️ Pilih file CSV terlebih dahulu";
        status.className = "mt-3 text-sm text-yellow-600";
        return;
    }

    const defaultName = fileInput.files[0].name.replace(/\.csv$/i, "");
    const newName = prompt("Masukkan nama dataset:", defaultName);
    if (!newName || newName.trim() === "") {
        status.innerHTML = "⚠️ Nama dataset tidak boleh kosong";
        status.className = "mt-3 text-sm text-yellow-600";
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    formData.append("name", newName.trim());

    status.innerHTML = "⏳ Uploading...";
    status.className = "mt-3 text-sm text-blue-600";

    try {
        await fetchWithAuth(`${BASE_URL}/datasets/upload`, {
            method: "POST",
            body: formData
        });
        status.innerHTML = `✅ Dataset "${newName.trim()}" berhasil diupload`;
        status.className = "mt-3 text-sm text-green-600";
        fileInput.value = "";
        window.allDatasets = await fetchDatasets();
        renderFilteredDatasetList();
    } catch (error) {
        status.innerHTML = `❌ Gagal upload: ${error.message}`;
        status.className = "mt-3 text-sm text-red-600";
    }
}

// ==================== DETAIL DATASET ====================
async function tampilDataset(id) {
    datasetDetailId = id;
    document.getElementById("detailDataset").classList.remove("hidden");
    const dataset = window.allDatasets?.find(ds => ds.id === id);
    document.getElementById("judulDataset").textContent = `Detail Dataset: ${dataset ? dataset.name : id}`;
    currentPageDetail = 1;
    await loadDetailPage();
}

async function loadDetailPage() {
    if (!datasetDetailId) return;

    try {
        const data = await fetchWithAuth(
            `${BASE_URL}/datasets/${datasetDetailId}/items?page=${currentPageDetail}&per_page=${ITEMS_PER_PAGE}`
        );
        renderDetailItems(data.items, data.total);
    } catch (error) {
        alert("Gagal memuat detail: " + error.message);
    }
}

function renderDetailItems(items, total) {
    const tbody = document.getElementById("isiDataset");
    tbody.innerHTML = "";

    const totalPages = Math.ceil(total / ITEMS_PER_PAGE) || 1;
    if (currentPageDetail > totalPages) currentPageDetail = totalPages;

    items.forEach(item => {
        const row = document.createElement("tr");
        row.className = "even:bg-gray-50";
        row.innerHTML = `
            <td class="p-2 text-center">${item.id}</td>
            <td class="p-2">${item.text}</td>
            <td class="p-2 text-center">${item.label ?? "-"}</td>
        `;
        tbody.appendChild(row);
    });

    renderPaginationDetail(totalPages);
}

function renderPaginationDetail(totalPages) {
    const container = document.getElementById("paginationDetail");
    container.innerHTML = "";

    if (totalPages <= 1) return;

    const prevBtn = document.createElement("button");
    prevBtn.textContent = "← Sebelumnya";
    prevBtn.className = "px-3 py-1 border border-gray-300 rounded-md bg-white hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed";
    prevBtn.disabled = currentPageDetail === 1;
    prevBtn.onclick = async () => {
        if (currentPageDetail > 1) {
            currentPageDetail--;
            await loadDetailPage();
        }
    };

    const nextBtn = document.createElement("button");
    nextBtn.textContent = "Berikutnya →";
    nextBtn.className = "px-3 py-1 border border-gray-300 rounded-md bg-white hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed";
    nextBtn.disabled = currentPageDetail === totalPages;
    nextBtn.onclick = async () => {
        if (currentPageDetail < totalPages) {
            currentPageDetail++;
            await loadDetailPage();
        }
    };

    const pageInfo = document.createElement("span");
    pageInfo.textContent = `Halaman ${currentPageDetail} dari ${totalPages}`;
    pageInfo.className = "text-sm text-gray-600";

    container.appendChild(prevBtn);
    container.appendChild(pageInfo);
    container.appendChild(nextBtn);
}

// ==================== SIDEBAR TOGGLE ====================
function toggleMenu(menuId) {
    const menus = document.querySelectorAll('.submenu');
    menus.forEach(menu => {
        if (menu.id !== menuId) menu.classList.add('hidden');
    });
    const current = document.getElementById(menuId);
    current.classList.toggle('hidden');
}

// ==================== INISIALISASI HALAMAN ====================
window.onload = async function () {
    if (!token) {
        alert("Anda harus login terlebih dahulu.");
        window.location.href = "login_admin.html";
        return;
    }

    window.allDatasets = await fetchDatasets();
    currentPageList = 1;
    renderFilteredDatasetList();
};
</script>

</body>
</html>
