<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduSentiment AI</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tambahan minimal */
        .error-message {
            display: none;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-400 to-cyan-400 font-sans h-screen overflow-hidden flex items-center justify-center">

    <div class="w-full max-w-sm px-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl">

            <!-- Logo -->
            <img src="../assets/images/logoppl.jpg" alt="Logo" class="w-48 mx-auto mb-1 block">

            <!-- Judul -->
            <h2 class="text-center text-xl font-semibold text-gray-800 mt-4 mb-5">Masuk Sebagai Admin</h2>

            <!-- Form -->
            <form id="loginForm">
                <!-- Username -->
                <div class="mb-4">
                    <label for="username" class="block mb-1.5 text-sm font-bold text-gray-600">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Masukkan username" 
                        required
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg outline-none transition-colors focus:border-blue-400 focus:ring-2 focus:ring-blue-200 text-sm"
                    >
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label for="password" class="block mb-1.5 text-sm font-bold text-gray-600">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Masukkan password" 
                        required
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg outline-none transition-colors focus:border-blue-400 focus:ring-2 focus:ring-blue-200 text-sm"
                    >
                </div>

                <!-- Error Message -->
                <div id="errorMsg" class="error-message text-red-500 text-sm mt-1 mb-2">
                    Username atau password salah
                </div>

                <!-- Tombol Login -->
                <button 
                    type="submit" 
                    class="w-full py-2.5 bg-blue-400 hover:bg-cyan-400 text-white font-semibold rounded-lg transition-colors text-base mt-2"
                >
                    Login
                </button>
            </form>

        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (username === 'sangbintang' && password === '1234') {
                errorMsg.style.display = 'none';
                window.location.href = 'dashboard_admin.html';
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
            }
        });
    </script>

</body>
</html>
